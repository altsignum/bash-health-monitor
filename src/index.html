<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Health Monitor</title>
    <style>
      :root {
        --bg: #0b0d12;
        --card: #121622;
        --text: #e7e9ee;
        --muted: #aab0bf;
        --line: #242a3a;

        --ok: #22c55e;
        --warn: #f59e0b;
        --bad: #ef4444;
        --stopped: #64748b;

        --link: #8ab4ff;
      }

      /* Scrollbar */
      * {
        scrollbar-width: thin;
        scrollbar-color: #2a3145 transparent;
      }

      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: linear-gradient(
          180deg,
          rgba(138,180,255,0.35),
          rgba(138,180,255,0.20)
        );
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 8px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(
          180deg,
          rgba(138,180,255,0.55),
          rgba(138,180,255,0.35)
        );
      }

      ::-webkit-scrollbar-corner {
        background: transparent;
      }
      /* Scrollbar */

      * { box-sizing: border-box; }

      html { height: 100%; }

      body {
        height: 100%;
        margin: 0;
        font: 14px/1.4 ui-sans-serif, system-ui, -apple-system,
          Segoe UI, Roboto, Helvetica, Arial;
        background: radial-gradient(1200px 600px at 20% -10%,
          rgba(138,180,255,0.18), transparent 60%),
          radial-gradient(900px 500px at 110% 10%,
          rgba(34,197,94,0.12), transparent 55%),
          var(--bg);
        color: var(--text);
      }

      .wrap {
        display: flex;
        flex-direction: column;
        height: 100%;
        max-width: 980px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
      }

      .header-right {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .sub {
        font-size: 12px;
        color: var(--muted);
      }

      .icon-btn {
        width: 26px;
        height: 26px;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.10);
        background: rgba(255,255,255,0.03);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        cursor: pointer;
        padding: 0;
      }

      .icon-btn:hover {
        border-color: rgba(255,255,255,0.16);
        background: rgba(255,255,255,0.05);
        color: var(--text);
      }

      .icon-btn:disabled {
        cursor: default;
        opacity: 0.9;
      }

      .icon {
        width: 16px;
        height: 16px;
        display: block;
      }

      .spin {
        animation: spin 0.8s linear infinite;
      }

      .card {
        background: linear-gradient(180deg,
          rgba(18,22,34,0.92),
          rgba(18,22,34,0.78));
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: auto;
      }

      .table-wrap {
        overflow: auto;
      }

      table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
      }

      thead th {
        position: sticky;
        top: 0;
        background: var(--card);
        z-index: 3;
        box-shadow: inset 0 -1px 0 var(--line);
      }

      th, td {
        padding: 12px;
        border-bottom: 1px solid var(--line);
        white-space: nowrap;
      }

      th {
        text-align: left;
        font-size: 12px;
        color: var(--muted);
        font-weight: 600;
      }

      tr:last-child td { border-bottom: none; }

      .host-row td {
        position: sticky;
        top: 41px;
        z-index: 2;
        padding: 10px 12px;
        background: linear-gradient(180deg,
          rgba(25,31,46,0.98),
          rgba(21,27,40,0.96));
        color: var(--text);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.02em;
        box-shadow: inset 0 -1px 0 rgba(138,180,255,0.12);
      }

      .host-btn {
        width: 100%;
        border: 0;
        padding: 0;
        background: transparent;
        color: inherit;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        text-align: left;
        cursor: pointer;
        font: inherit;
      }

      .host-left {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .chevron {
        width: 10px;
        height: 10px;
        border-right: 2px solid var(--muted);
        border-bottom: 2px solid var(--muted);
        transform: rotate(45deg);
        transition: transform 0.15s ease;
        flex: 0 0 auto;
        margin-top: -2px;
      }

      .host-row.collapsed .chevron {
        transform: rotate(-45deg);
        margin-top: 0;
      }

      .host-name {
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .host-meta {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        flex: 0 0 auto;
        color: var(--muted);
        font-weight: 500;
      }

      .host-count {
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.03);
        color: var(--text);
      }

      .row-hidden {
        display: none;
      }

      .svc {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      .dot.stable { background: var(--ok); }
      .dot.unstable { background: var(--warn); }
      .dot.failed { background: var(--bad); }
      .dot.stopped { background: var(--stopped); }
      .dot.restarting { background: var(--bad); }
      .dot.completed { background: var(--ok); }
      .dot.transition { background: var(--warn); }

      .badge {
        cursor: pointer;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        color: var(--text);
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.03);
      }

      .badge:hover, .badge:active {
        text-decoration: none;
      }

      .badge.stable {
        background: rgba(34,197,94,0.10);
        border-color: rgba(34,197,94,0.35);
      }

      .badge.unstable {
        background: rgba(245,158,11,0.10);
        border-color: rgba(245,158,11,0.35);
      }

      .badge.failed {
        background: rgba(239,68,68,0.10);
        border-color: rgba(239,68,68,0.35);
      }

      .badge.stopped {
        background: rgba(100,116,139,0.10);
        border-color: rgba(100,116,139,0.35);
      }

      .badge.restarting {
        background: rgba(239,68,68,0.10);
        border-color: rgba(239,68,68,0.35);
      }

      .badge.completed {
        background: rgba(34,197,94,0.10);
        border-color: rgba(34,197,94,0.35);
      }

      .badge.transition {
        background: rgba(245,158,11,0.10);
        border-color: rgba(245,158,11,0.35);
      }

      .muted { color: var(--muted); }

      a {
        color: var(--link);
        text-decoration: none;
      }

      a:hover { text-decoration: underline; }

      .copy {
        color: var(--link);
        cursor: pointer;
      }

      .loading-cell {
        padding: 18px 12px;
      }

      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .spinner {
        width: 14px;
        height: 14px;
        border-radius: 999px;
        border: 2px solid rgba(170,176,191,0.25);
        border-top-color: rgba(170,176,191,0.95);
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Health Monitor</h1>

        <div class="header-right">
          <div class="sub" id="lastRefresh">Last refresh: --</div>

          <button class="icon-btn" id="refreshBtn" type="button"
            aria-label="Refresh">
            <svg class="icon" id="refreshIcon" viewBox="0 0 24 24"
              fill="none" aria-hidden="true">
              <path
                d="M20 12a8 8 0 1 1-2.343-5.657"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <path
                d="M20 4v6h-6"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
      </header>

      <div class="card">
        <div class="table-wrap">
          <table>
          <thead>
            <tr>
              <th>Service</th>
              <th>Status</th>
              <th>Active Since</th>
              <th>Host</th>
              <th>Details</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr>
              <td class="loading-cell" colspan="5">
                <div class="loading">
                  <span class="spinner" aria-hidden="true"></span>
                  <span>Loading...</span>
                </div>
              </td>
            </tr>
          </tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      (function () {
        "use strict";

        const $rows = document.getElementById("rows");
        const $lastRefresh = document.getElementById("lastRefresh");
        const $refreshBtn = document.getElementById("refreshBtn");
        const $refreshIcon = document.getElementById("refreshIcon");

        let isLoadedOnce = false;
        let isRefreshing = false;
        const collapsedHosts = new Set();

        /* ===================== API helper ===================== */

        function getSelfRoot() {
          let root = window.location.origin +
            window.location.pathname.replace(/\/[^\/]*$/, "");

          if (!root.endsWith("/")) root += "/";
          return root;
        }

        function buildApiUrl(base, path) {
          const selfRoot = getSelfRoot();

          if (path.startsWith("/")) path = path.slice(1);

          if (base === "__self__") {
            return selfRoot + path;
          }

          const u = new URL(selfRoot + path);
          u.searchParams.set("monitor", String(base));
          return u.toString();
        }

        async function apiJson(base, path, timeoutMs = 5000) {
          const url = buildApiUrl(base, path);

          const ac = new AbortController();
          const t = setTimeout(() => ac.abort(), timeoutMs);

          try {
            const res = await fetch(url, {
              signal: ac.signal,
              cache: "no-store"
            });

            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.json();
          } finally {
            clearTimeout(t);
          }
        }

        /* ===================== UI helpers ===================== */

        function escapeHtml(s) {
          return String(s)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll("\"", "&quot;")
            .replaceAll("'", "&#39;");
        }

        async function copyText(text) {
          const value = String(text ?? "");
          if (!value) return;

          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(value);
            return;
          }

          const ta = document.createElement("textarea");
          ta.value = value;
          ta.setAttribute("readonly", "");
          ta.style.position = "fixed";
          ta.style.left = "-9999px";
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
        }

        function compareText(a, b) {
          return String(a ?? "").localeCompare(String(b ?? ""), undefined, {
            sensitivity: "base",
            numeric: true
          });
        }

        function getStatusRank(status) {
          switch (status) {
            case "failed": return 0;
            case "restarting": return 1;
            case "unstable": return 2;
            case "transition": return 3;
            case "stopped": return 4;
            case "stable": return 5;
            case "completed": return 6;
            default: return 7;
          }
        }

        function renderRow(item) {
          const name = escapeHtml(item.name);
          const status = escapeHtml(item.status);
          const host = escapeHtml(item.host);
          const timestamp = item.activeSince
            ? new Date(item.activeSince).toLocaleString()
            : '--';
          const activeSince = `<span class="muted">${timestamp}</span>`;

          const detailsItems = [];

          if (item.status === "unstable" && typeof item.errorCount === "number") {
            detailsItems.push(
              `<div>
                <a href="errors?service=${encodeURIComponent(item.name)}${item.monitor ? `&monitor=${encodeURIComponent(item.monitor)}` : ''}&format=text"
                  target="_blank"
                  title="Click to open errors">
                  Errors (${item.errorCount})
                </a>
              </div>`
            );
          }

          if (item.lastRestart && typeof item.restartCount === "number") {
            detailsItems.push(
              `<div>
                <a href="logs?service=${encodeURIComponent(item.name)}${item.monitor ? `&monitor=${encodeURIComponent(item.monitor)}` : ''}&n=200"
                  target="_blank"
                  title="Click to open logs. Last restart: ${new Date(item.lastRestart).toLocaleString()}">
                  Restarts (${item.restartCount})
                </a>
              </div>`
            );
          }

          if (detailsItems.length === 0 && item.status === "stable" && item.journalEmpty === true) {
            detailsItems.push(
              `<div>
                ⚠️ Journal empty
              </div>`
            );
          }

          const details = detailsItems.length > 0
            ? detailsItems.join("")
            : `<span class="muted">--</span>`;

          return `
            <tr class="service-row" data-host="${host}">
              <td>
                <div class="svc">
                  <span class="dot ${status}" aria-hidden="true"></span>
                  <span class="copy"
                    title="Click to copy"
                    data-action="copy"
                    data-copy="${name}">${name}</span>
                </div>
              </td>
              <td>
                <a class="badge ${status}"
                  href="logs?service=${encodeURIComponent(item.name)}${item.monitor ? `&monitor=${encodeURIComponent(item.monitor)}` : ''}&n=200&syslog=true"
                  target="_blank"
                  title="Click to open recent logs"
                  >
                  ${status}
                </a>
              </td>
              <td>${activeSince}</td>
              <td class="muted">
                <span class="copy"
                  title="Click to copy"
                  data-action="copy"
                  data-copy="${host}">${host}</span>
              </td>
              <td>${details}</td>
            </tr>
          `.trim();
        }

        function groupByHost(items) {
          const map = new Map();

          for (const item of items) {
            const host = String(item.host || "Unknown host");

            if (!map.has(host)) map.set(host, []);
            map.get(host).push(item);
          }

          return [...map.entries()]
            .sort((a, b) => compareText(a[0], b[0]))
            .map(([host, services]) => {
              const sortedServices = [...services].sort((a, b) => {
                const statusDiff = getStatusRank(a.status) - getStatusRank(b.status);
                if (statusDiff !== 0) return statusDiff;

                const nameDiff = compareText(a.name, b.name);
                if (nameDiff !== 0) return nameDiff;

                return compareText(a.activeSince, b.activeSince);
              });

              const badCount = sortedServices.filter((x) =>
                ["failed", "restarting", "unstable", "transition"]
                  .includes(String(x.status))
              ).length;

              return {
                host,
                services: sortedServices,
                badCount
              };
            });
        }

        function renderHostRow(group) {
          const host = escapeHtml(group.host);
          const isCollapsed = collapsedHosts.has(group.host);
          const total = group.services.length;
          const problemText = group.badCount > 0
            ? `<span class="host-count">Issues: ${group.badCount}</span>`
            : `<span class="host-count">OK</span>`;

          return `
            <tr class="host-row${isCollapsed ? " collapsed" : ""}">
              <td colspan="5">
                <button
                  class="host-btn"
                  type="button"
                  data-action="toggle-host"
                  data-host="${host}"
                  aria-expanded="${isCollapsed ? "false" : "true"}"
                >
                  <span class="host-left">
                    <span class="chevron" aria-hidden="true"></span>
                    <span class="host-name">${host}</span>
                  </span>
                  <span class="host-meta">
                    <span class="host-count">Services: ${total}</span>
                    ${problemText}
                  </span>
                </button>
              </td>
            </tr>
          `.trim();
        }

        function renderTable(items) {
          const groups = groupByHost(items);
          const html = [];

          for (const group of groups) {
            html.push(renderHostRow(group));

            const hiddenClass = collapsedHosts.has(group.host)
              ? " row-hidden"
              : "";

            for (const service of group.services) {
              html.push(
                renderRow(service).replace(
                  'class="service-row"',
                  `class="service-row${hiddenClass}"`
                )
              );
            }
          }

          $rows.innerHTML = html.join("");
          $lastRefresh.textContent =
            `Last refresh: ${new Date().toLocaleString()}`;
          isLoadedOnce = true;
        }

        function setRefreshing(flag) {
          isRefreshing = flag;
          $refreshBtn.disabled = flag;
          $refreshIcon.classList.toggle("spin", flag);
        }

        $rows.addEventListener("click", (e) => {
          const toggleEl = e.target && e.target.closest
            ? e.target.closest("[data-action=\"toggle-host\"][data-host]")
            : null;

          if (toggleEl) {
            e.preventDefault();
            toggleHost(toggleEl.getAttribute("data-host") || "");
            return;
          }

          const copyEl = e.target && e.target.closest
            ? e.target.closest("[data-action=\"copy\"][data-copy]")
            : null;

          if (copyEl) {
            e.preventDefault();
            const text = copyEl.getAttribute("data-copy") || "";
            copyText(text).catch(() => {});
            return;
          }
        });

        function toggleHost(host) {
          if (!host) return;

          if (collapsedHosts.has(host)) {
            collapsedHosts.delete(host);
          } else {
            collapsedHosts.add(host);
          }

          const isCollapsed = collapsedHosts.has(host);
          const selectorHost = window.CSS && typeof window.CSS.escape === "function"
            ? window.CSS.escape(host)
            : host.replaceAll('\\', '\\\\').replaceAll('"', '\"');

          const hostButton = $rows.querySelector(
            `[data-action="toggle-host"][data-host="${selectorHost}"]`
          );

          if (hostButton) {
            hostButton.setAttribute("aria-expanded", isCollapsed ? "false" : "true");

            const hostRow = hostButton.closest(".host-row");
            if (hostRow) hostRow.classList.toggle("collapsed", isCollapsed);
          }

          const serviceRows = $rows.querySelectorAll(
            `.service-row[data-host="${selectorHost}"]`
          );

          for (const row of serviceRows) {
            row.classList.toggle("row-hidden", isCollapsed);
          }
        }

        /* ===================== Refresh ===================== */

        function flattenServices(root) {
          const result = [];

          function walk(node, path) {
            if (!node) return;

            if (Array.isArray(node.services)) {
              for (const svc of node.services) {
                result.push({
                  ...svc,
                  path: [...path]
                });
              }
            }

            if (Array.isArray(node.monitors)) {
              for (const monitor of node.monitors) {
                const nextPath = monitor.name != null
                  ? [...path, monitor.name]
                  : [...path];

                walk(monitor, nextPath);
              }
            }
          }

          walk(root, []);
          return result;
        }

        async function refresh() {
          if (isRefreshing) return;

          setRefreshing(true);
          try {
            const self = "__self__";
            const data = await apiJson(self, "/all", 60000);
            const services = flattenServices(data);
            renderTable(services);
          } finally {
            setRefreshing(false);
          }
        }

        $refreshBtn.addEventListener("click", refresh);

        (async function init() {
          await refresh();
          setInterval(refresh, 300 * 1000); // every 5 minutes
        })();
      })();
    </script>

  </body>
</html>
